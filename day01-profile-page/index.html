<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- head 里放网页的基础信息，这些内容通常不会直接显示在页面上。 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的第一个网页</title>
    <!-- link 用来连接外部 CSS 文件，让 styles.css 控制页面样式。 -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- main 表示页面的主要内容区域。 -->
    <main class="page">
      <!-- section 表示页面中的一个独立内容块，这里是一张个人介绍卡片。 -->
      <section class="profile">
        <p class="eyebrow">Day 01</p>
        <h1>你好，我是 <span id="displayName">乐观积极自信</span></h1>
        <p class="intro">
          我正在从 0 开始学习全栈开发，目标是学会用 AI 协作完成真实项目。
        </p>

        <!-- 这个区域用来练习输入框、按钮和 JavaScript 读取用户输入。 -->
        <div class="name-editor">
          <label for="nameInput">修改页面名字</label>
          <div class="name-actions">
            <input id="nameInput" type="text" placeholder="输入新的名字" />
            <button id="saveNameButton" type="button">保存名字</button>
          </div>
          <p id="nameMessage" class="message">输入名字后，点击按钮试试看。</p>
        </div>

        <!-- 统计信息会由 JavaScript 根据卡片完成状态自动更新。 -->
        <div id="cardStats" class="card-stats"></div>
        <div class="card-filter">
          <label for="cardStatusFilter">筛选学习卡片</label>
          <input id="cardSearchInput" type="text" placeholder="搜索卡片标题" />
          <select id="cardStatusFilter">
            <option value="all">全部</option>
            <option value="completed">已完成</option>
            <option value="pending">未完成</option>
          </select>
          <select id="cardLevelFilter">
            <option value="all">全部等级</option>
            <option value="基础">基础</option>
            <option value="计划">计划</option>
          </select>
          <button id="clearCardFiltersButton" class="secondary-button" type="button">
            清空筛选
          </button>
        </div>

        <!-- 这里的卡片会由 JavaScript 根据对象数组自动生成。 -->
        <div id="infoGrid" class="info-grid"></div>

        <!-- 这个区域用来练习创建对象，并把对象添加到数组中。 -->
        <div class="card-editor">
          <label for="cardTitleInput">添加学习卡片</label>
          <div class="card-actions">
            <input id="cardTitleInput" type="text" maxlength="12" placeholder="卡片标题" />
            <input id="cardTextInput" type="text" maxlength="60" placeholder="卡片正文" />
            <select id="cardLevelInput">
              <option value="基础">基础</option>
              <option value="计划">计划</option>
            </select>
            <button id="addCardButton" type="button">添加卡片</button>
            <button id="resetCardsButton" class="secondary-button" type="button">
              重置卡片
            </button>
          </div>
          <p id="cardTitleCounter" class="counter">还可以输入 12 个字</p>
          <p id="cardTextCounter" class="counter">正文还可以输入 60 个字</p>
          <p id="cardMessage" class="message">填写标题和正文后，可以新增一张卡片。</p>
        </div>

        <div class="section-title">
          <h2>我的兴趣</h2>
          <span id="interestCount" class="count-badge">0 项</span>
        </div>
        <!-- ul 是兴趣列表的容器，里面的 li 会由 JavaScript 根据数组自动生成。 -->
        <ul id="interestList" class="interest-list"></ul>

        <!-- 搜索只影响显示结果，不会修改真正的兴趣数组。 -->
        <div class="search-editor">
          <label for="searchInput">搜索兴趣</label>
          <input id="searchInput" type="text" placeholder="输入关键词筛选兴趣" />
        </div>

        <!-- 这个区域用来练习动态添加列表项。 -->
        <div class="interest-editor">
          <label for="interestInput">添加新的兴趣</label>
          <div class="interest-actions">
            <input id="interestInput" type="text" placeholder="例如：阅读" />
            <button id="addInterestButton" type="button">添加兴趣</button>
            <button id="resetInterestsButton" class="secondary-button" type="button">
              重置兴趣
            </button>
            <button id="clearInterestsButton" class="danger-button" type="button">
              清空兴趣
            </button>
            <button id="cancelEditButton" class="secondary-button hidden" type="button">
              取消编辑
            </button>
          </div>
          <p id="interestMessage" class="message">输入兴趣后，可以把它加入列表。</p>
        </div>

        <!-- id="themeButton" 会被 script.js 用来找到这个按钮。 -->
        <button id="themeButton" type="button">切换主题</button>
      </section>
    </main>

    <!-- script 放在 body 结束前，可以确保页面内容先加载，再执行 JavaScript。 -->
    <script src="script.js"></script>
  </body>
</html>
