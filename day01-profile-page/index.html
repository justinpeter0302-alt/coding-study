<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- head 里放网页的基础信息，这些内容通常不会直接显示在页面上。 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的第一个网页</title>
    <!-- link 用来连接外部 CSS 文件，让 styles.css 控制页面样式。 -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- main 表示页面的主要内容区域。 -->
    <main class="page">
      <!-- section 表示页面中的一个独立内容块，这里是一张个人介绍卡片。 -->
      <section class="profile">
        <p class="eyebrow">Day 01</p>
        <h1>你好，我是 乐观积极自信</h1>
        <p class="intro">
          我正在从 0 开始学习全栈开发，目标是学会用 AI 协作完成真实项目。
        </p>

        <!-- article 适合表达一块相对完整的信息，比如一张说明卡片。 -->
        <div class="info-grid">
          <article>
            <h2>今天学习</h2>
            <p>HTML 负责网页结构，CSS 负责样式，JavaScript 负责交互。</p>
          </article>
          <article>
            <h2>近期目标</h2>
            <p>先做出简单页面，再逐步学习 React、后端、数据库和部署。</p>
          </article>
        </div>

        <h2>我的兴趣</h2>
        <!-- ul 是无序列表，li 是列表里的每一项。 -->
        <ul class="interest-list">
          <li>Vibe coding</li>
          <li>弹吉他</li>
          <li>健身</li>
        </ul>

        <!-- id="themeButton" 会被 script.js 用来找到这个按钮。 -->
        <button id="themeButton" type="button">切换主题</button>
      </section>
    </main>

    <!-- script 放在 body 结束前，可以确保页面内容先加载，再执行 JavaScript。 -->
    <script src="script.js"></script>
  </body>
</html>
